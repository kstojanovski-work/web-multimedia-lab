version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sign2text-backend
    ports:
      - "8000:8000"
    environment:
      - MODEL_PROVIDER=stub
      - CORS_ORIGINS=http://localhost:5173
    volumes:
      - ./backend:/app/backend
      - ./ml:/app/ml
      - ./contracts:/app/contracts

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: sign2text-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_WS_URL=ws://localhost:8000/ws/live
    depends_on:
      - backend
